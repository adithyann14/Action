name: Build Pipa Kernel

on:
  workflow_dispatch:
    inputs:
      lto:
        description: 'LTO mode (thin/full/none)'
        required: false
        default: 'thin'
        type: choice
        options:
          - thin
          - full
          - none
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev libelf-dev zip wget

      - name: Download Clang
        run: |
          mkdir -p $HOME/tc
          curl -L -o /tmp/clang.tar.gz \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r547379.tar.gz"
          tar -xzf /tmp/clang.tar.gz -C $HOME/tc
          echo "$HOME/tc/bin" >> $GITHUB_PATH

      - name: Clone kernel
        run: |
          git clone --depth=1 https://github.com/adithyann14/android_kernel_xiaomi_sm8250 ./kernel

      - name: Build Pipa kernel with LTO=${{ github.event.inputs.lto || 'thin' }}
        run: |
          cd kernel
          
          LTO_MODE="${{ github.event.inputs.lto || 'thin' }}"
          
          echo "========================================="
          echo "Building Pipa Kernel"
          echo "LTO mode: $LTO_MODE"
          echo "========================================="
          
          echo "Merging defconfigs..."
          cat arch/arm64/configs/vendor/kona-perf_defconfig \
              arch/arm64/configs/vendor/debugfs.config \
              arch/arm64/configs/vendor/xiaomi/sm8250-common.config \
              arch/arm64/configs/vendor/xiaomi/pipa.config \
              > arch/arm64/configs/pipa_merged_defconfig
          
          case "$LTO_MODE" in
            full)
              echo "CONFIG_LTO_CLANG=y" >> arch/arm64/configs/pipa_merged_defconfig
              echo "CONFIG_LTO_CLANG_FULL=y" >> arch/arm64/configs/pipa_merged_defconfig
              echo "CONFIG_THINLTO=n" >> arch/arm64/configs/pipa_merged_defconfig
              ;;
            thin)
              echo "CONFIG_LTO_CLANG=y" >> arch/arm64/configs/pipa_merged_defconfig
              echo "CONFIG_LTO_CLANG_THIN=y" >> arch/arm64/configs/pipa_merged_defconfig
              echo "CONFIG_THINLTO=y" >> arch/arm64/configs/pipa_merged_defconfig
              ;;
            none)
              echo "CONFIG_LTO_NONE=y" >> arch/arm64/configs/pipa_merged_defconfig
              echo "CONFIG_LTO_CLANG=n" >> arch/arm64/configs/pipa_merged_defconfig
              ;;
          esac
          
          echo "Configuring kernel..."
          make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            pipa_merged_defconfig
          
          echo "Building kernel..."
          make -j$(nproc) O=out ARCH=arm64 \
            CC=clang LLVM=1 LLVM_IAS=1 \
            LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            all
          
          if [ -f "out/arch/arm64/boot/Image" ]; then
            echo "Build successful!"
            echo "Image size: $(ls -lh out/arch/arm64/boot/Image | awk '{print $5}')"
          else
            echo "Build failed!"
            exit 1
          fi

      - name: Collect and package artifacts
        run: |
          cd kernel
          mkdir -p ../output

          # Copy Image
          cp out/arch/arm64/boot/Image ../output/

          # Find and copy dtbo.img
          DTBO=$(find out/arch/arm64/boot -name "dtbo.img" 2>/dev/null | head -1)
          if [ -n "$DTBO" ]; then
            echo "Found dtbo.img at: $DTBO"
            cp "$DTBO" ../output/
          else
            echo "dtbo.img not found, skipping"
          fi

          # Find and copy dtb (file or folder)
          DTB=$(find out/arch/arm64/boot -name "dtb" 2>/dev/null | head -1)
          if [ -n "$DTB" ]; then
            echo "Found dtb at: $DTB"
            if [ -d "$DTB" ]; then
              cp -r "$DTB" ../output/dtb/
            else
              cp "$DTB" ../output/
            fi
          else
            echo "dtb not found, skipping"
          fi

          # List what we collected
          echo "=== Collected artifacts ==="
          ls -lh ../output/

          # Compress everything into a zip
          cd ..
          ZIP_NAME="pipa-kernel-${{ github.event.inputs.lto || 'thin' }}-$(date +%Y%m%d-%H%M).zip"
          zip -r "$ZIP_NAME" output/
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "=== Final zip ==="
          ls -lh "$ZIP_NAME"

      - name: Upload kernel zip
        uses: actions/upload-artifact@v4
        with:
          name: pipa-kernel-${{ github.event.inputs.lto || 'thin' }}-${{ github.run_id }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

name: Build Pipa Kernel

on:
  workflow_dispatch:
    inputs:
      lto:
        description: 'LTO mode (thin/full/none)'
        required: false
        default: 'thin'
        type: choice
        options:
          - thin
          - full
          - none
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev libelf-dev zip wget

      - name: Download Clang
        run: |
          mkdir -p $HOME/tc
          curl -L -o /tmp/clang.tar.gz \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r547379.tar.gz"
          tar -xzf /tmp/clang.tar.gz -C $HOME/tc
          echo "$HOME/tc/bin" >> $GITHUB_PATH

      - name: Clone kernel
        run: |
          git clone --depth=1 https://github.com/adithyann14/android_kernel_xiaomi_sm8250 ./kernel

      - name: Build Pipa kernel with LTO=${{ github.event.inputs.lto || 'thin' }}
        run: |
          cd kernel
          
          LTO_MODE="${{ github.event.inputs.lto || 'thin' }}"
          
          echo "========================================="
          echo "Building Pipa Kernel"
          echo "LTO mode: $LTO_MODE"
          echo "========================================="
          
          echo "Merging defconfigs..."
          cat arch/arm64/configs/vendor/kona-perf_defconfig \
              arch/arm64/configs/vendor/debugfs.config \
              arch/arm64/configs/vendor/xiaomi/sm8250-common.config \
              arch/arm64/configs/vendor/xiaomi/pipa.config \
              > arch/arm64/configs/pipa_merged_defconfig
          
          case "$LTO_MODE" in
            full)
              echo "CONFIG_LTO_CLANG=y" >> arch/arm64/configs/pipa_merged_defconfig
              echo "CONFIG_LTO_CLANG_FULL=y" >> arch/arm64/configs/pipa_merged_defconfig
              echo "CONFIG_THINLTO=n" >> arch/arm64/configs/pipa_merged_defconfig
              ;;
            thin)
              echo "CONFIG_LTO_CLANG=y" >> arch/arm64/configs/pipa_merged_defconfig
              echo "CONFIG_LTO_CLANG_THIN=y" >> arch/arm64/configs/pipa_merged_defconfig
              echo "CONFIG_THINLTO=y" >> arch/arm64/configs/pipa_merged_defconfig
              ;;
            none)
              echo "CONFIG_LTO_NONE=y" >> arch/arm64/configs/pipa_merged_defconfig
              echo "CONFIG_LTO_CLANG=n" >> arch/arm64/configs/pipa_merged_defconfig
              ;;
          esac
          
          echo "Configuring kernel..."
          make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            pipa_merged_defconfig
          
          echo "Building kernel..."
          make -j$(nproc) O=out ARCH=arm64 \
            CC=clang LLVM=1 LLVM_IAS=1 \
            LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            all
          
          if [ -f "out/arch/arm64/boot/Image" ]; then
            echo "Build successful!"
            echo "Image size: $(ls -lh out/arch/arm64/boot/Image | awk '{print $5}')"
          else
            echo "Build failed!"
            exit 1
          fi

      - name: Debug - Find all DT files everywhere
        run: |
          cd kernel
          echo "=== Searching entire out/ for dtb/dtbo ==="
          find out/ -name "*.dtb" -o -name "*.dtbo" -o -name "dtbo.img" -o -name "dtb" 2>/dev/null | sort

          echo ""
          echo "=== Contents of out/arch/arm64/boot/ ==="
          ls -lh out/arch/arm64/boot/ || true

          echo ""
          echo "=== Contents of out/arch/arm64/boot/dts/ (if exists) ==="
          ls -lh out/arch/arm64/boot/dts/ 2>/dev/null || echo "dts/ not found"

          echo ""
          echo "=== Recursive DTS vendor dirs ==="
          find out/arch/arm64/boot/dts -type d 2>/dev/null | sort || echo "No dts dirs found"

          echo ""
          echo "=== arm64 Makefile DT targets ==="
          grep -i "dtb\|dtbo\|overlay" arch/arm64/Makefile 2>/dev/null || true

          echo ""
          echo "=== boot Makefile DT targets ==="
          grep -i "dtb\|dtbo\|overlay" arch/arm64/boot/Makefile 2>/dev/null || true

          echo ""
          echo "=== pipa.config DT related ==="
          grep -i "dtb\|dtbo\|overlay\|DTS\|BUILD_ARM64" \
            arch/arm64/configs/vendor/xiaomi/pipa.config 2>/dev/null || true

          echo ""
          echo "=== kona defconfig DT related ==="
          grep -i "dtb\|dtbo\|overlay\|DTS\|BUILD_ARM64" \
            arch/arm64/configs/vendor/kona-perf_defconfig 2>/dev/null || true

      - name: Collect and package artifacts
        run: |
          cd kernel
          mkdir -p ../output

          # Image
          cp out/arch/arm64/boot/Image ../output/
          echo "✓ Image copied"

          # dtbo.img - search everywhere
          DTBO=$(find out/ -name "dtbo.img" 2>/dev/null | head -1)
          if [ -n "$DTBO" ]; then
            cp "$DTBO" ../output/dtbo.img
            echo "✓ dtbo.img found at: $DTBO"
          else
            echo "✗ dtbo.img not found anywhere"
          fi

          # dtb file (concatenated)
          DTB_FILE=$(find out/ -name "dtb" -not -type d 2>/dev/null | head -1)
          if [ -n "$DTB_FILE" ]; then
            cp "$DTB_FILE" ../output/dtb
            echo "✓ dtb file found at: $DTB_FILE"
          else
            echo "✗ dtb file not found"
          fi

          # individual .dtb files
          DTB_COUNT=$(find out/ -name "*.dtb" 2>/dev/null | wc -l)
          if [ "$DTB_COUNT" -gt 0 ]; then
            mkdir -p ../output/dtbs
            find out/ -name "*.dtb" -exec cp {} ../output/dtbs/ \;
            echo "✓ Found $DTB_COUNT .dtb files"
          else
            echo "✗ No individual .dtb files found"
          fi

          # individual .dtbo files
          DTBO_COUNT=$(find out/ -name "*.dtbo" 2>/dev/null | wc -l)
          if [ "$DTBO_COUNT" -gt 0 ]; then
            mkdir -p ../output/dtbos
            find out/ -name "*.dtbo" -exec cp {} ../output/dtbos/ \;
            echo "✓ Found $DTBO_COUNT .dtbo files"
          else
            echo "✗ No individual .dtbo files found"
          fi

          echo ""
          echo "=== Final output ==="
          ls -lhR ../output/

          # Zip everything
          cd ..
          ZIP_NAME="pipa-kernel-${{ github.event.inputs.lto || 'thin' }}-$(date +%Y%m%d-%H%M).zip"
          zip -r "$ZIP_NAME" output/
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "✓ Zipped as $ZIP_NAME ($(ls -lh $ZIP_NAME | awk '{print $5}'))"

      - name: Upload kernel zip
        uses: actions/upload-artifact@v4
        with:
          name: pipa-kernel-${{ github.event.inputs.lto || 'thin' }}-${{ github.run_id }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

name: Build Sky Kernel

on:
  workflow_dispatch:
    inputs:
      lto:
        description: 'LTO mode (thin/full/none)'
        required: false
        default: 'thin'
        type: choice
        options:
          - thin
          - full
          - none
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev libelf-dev zip wget

      - name: Download Clang
        run: |
          mkdir -p $HOME/tc
          curl -L -o /tmp/clang.tar.gz \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r547379.tar.gz"
          tar -xzf /tmp/clang.tar.gz -C $HOME/tc
          echo "$HOME/tc/bin" >> $GITHUB_PATH

      - name: Clone kernel
        run: |
          git clone --depth=1 -b lineage-23.2 https://github.com/TopexGuy/kernel_xiaomi_sky.git kernel
          cd kernel

      - name: Build kernel with LTO=${{ github.event.inputs.lto || 'thin' }}
        run: |
          cd kernel
          
          # Set LTO mode
          LTO_MODE="${{ github.event.inputs.lto || 'thin' }}"
          
          echo "========================================="
          echo "Building with LTO mode: $LTO_MODE"
          echo "========================================="
          
          # Append sky_GKI.config if exists
          if [ -f "../sky_GKI.config" ]; then
            echo "Appending sky_GKI.config..."
            cat ../sky_GKI.config >> arch/arm64/configs/gki_defconfig
          fi
          
          # Add LTO config based on selection
          case "$LTO_MODE" in
            full)
              echo "CONFIG_LTO_CLANG=y" >> arch/arm64/configs/gki_defconfig
              echo "CONFIG_LTO_CLANG_FULL=y" >> arch/arm64/configs/gki_defconfig
              echo "CONFIG_THINLTO=n" >> arch/arm64/configs/gki_defconfig
              ;;
            thin)
              echo "CONFIG_LTO_CLANG=y" >> arch/arm64/configs/gki_defconfig
              echo "CONFIG_LTO_CLANG_THIN=y" >> arch/arm64/configs/gki_defconfig
              echo "CONFIG_THINLTO=y" >> arch/arm64/configs/gki_defconfig
              ;;
            none)
              echo "CONFIG_LTO_NONE=y" >> arch/arm64/configs/gki_defconfig
              echo "CONFIG_LTO_CLANG=n" >> arch/arm64/configs/gki_defconfig
              ;;
          esac
          
          # Configure
          make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            gki_defconfig
          
          # Build
          make -j$(nproc) O=out ARCH=arm64 \
            CC=clang LLVM=1 LLVM_IAS=1 \
            LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi-

      - uses: actions/upload-artifact@v4
        with:
          name: Image-lto-${{ github.event.inputs.lto || 'thin' }}
          path: kernel/out/arch/arm64/boot/Image
